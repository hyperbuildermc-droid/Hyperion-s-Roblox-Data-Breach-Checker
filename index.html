<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPERION | KEY SYSTEM</title>
    <style>
        /* Keep original body logic */
        body { 
            display: none; 
            background-color: #030303; 
            color: #ff0000; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-direction: column;
            position: relative;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.4; /* Subtle backdrop rain */
        }

        /* Keep original Scanline Animation */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 0, 0, 0), rgba(255, 0, 0, 0.04));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .box { 
            border: 2px solid #ff0000; 
            padding: 40px; 
            background: rgba(5, 5, 5, 0.95);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.2), inset 0 0 20px rgba(0,0,0,1); 
            position: relative;
            z-index: 3;
            max-width: 480px;
            width: 85%;
            text-align: center;
            border-radius: 0; /* Industrial sharp edges */
        }

        /* Glitchy glow effect for the box corners */
        .box::after {
            content: "";
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border: 1px solid rgba(255, 0, 0, 0.3);
            z-index: -1;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 { 
            letter-spacing: 15px; 
            text-shadow: 3px 3px #550000; 
            margin: 0;
            font-size: 2.8rem;
            text-transform: uppercase; 
            font-weight: 900;
        }

        .subtitle { 
            color: #ff0000; 
            font-size: 10px; 
            margin-bottom: 25px; 
            letter-spacing: 5px; 
            text-transform: uppercase;
            opacity: 0.7;
        }

        .status-badge {
            font-size: 11px;
            color: #000;
            background: #00ff00;
            padding: 4px 12px;
            display: inline-block;
            margin-bottom: 25px;
            font-weight: bold;
            box-shadow: 0 0 10px #00ff00;
        }

        .key-container { 
            background: #000; 
            border: 1px solid #ff0000; 
            padding: 25px; 
            margin: 20px 0; 
            position: relative;
            overflow: hidden;
        }

        #key-text { 
            font-size: 22px; 
            color: #fff; 
            font-weight: bold; 
            letter-spacing: 4px; 
            word-break: break-all;
            position: relative;
            z-index: 4;
        }

        button { 
            background: #ff0000; 
            color: #000; 
            border: 2px solid #ff0000; 
            padding: 15px 40px; 
            font-family: 'Courier New', monospace; 
            font-weight: 900; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-top: 15px; 
            text-transform: uppercase; 
            letter-spacing: 3px;
        }

        button:hover { 
            background: transparent; 
            color: #ff0000;
            box-shadow: 0 0 20px #ff0000;
        }

        .footer-info { color: #555; font-size: 11px; margin-top: 30px; border-top: 1px solid #222; padding-top: 15px; }
        
        /* Updated Discord Link Style */
        .discord-link { 
            color: #5865F2; 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: bold; 
            display: inline-block; 
            margin-top: 10px;
            letter-spacing: 1px;
            border: 1px solid #5865F2;
            padding: 5px 15px;
            transition: 0.3s;
        }
        .discord-link:hover {
            background: #5865F2;
            color: #fff;
            box-shadow: 0 0 15px #5865F2;
        }

        /* Access Denied Style - Enhanced */
        .denied-screen { 
            display: flex !important; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000; 
            color: red; 
            height: 100vh;
            width: 100vw;
            z-index: 10;
            text-align: center;
        }

        .denied-screen h1 { 
            font-size: 3.5rem;
            animation: glitch 0.2s infinite; 
        }

        .warning-icon {
            font-size: 50px;
            margin-bottom: 20px;
            animation: blinker 0.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0; }
        }

        @keyframes glitch {
            0% { clip: rect(42px, 9999px, 44px, 0); transform: skew(0.5deg); }
            50% { clip: rect(12px, 9999px, 56px, 0); transform: skew(-0.5deg); color: #fff; }
            100% { clip: rect(67px, 9999px, 86px, 0); transform: skew(0.8deg); }
        }

        /* Security Trigger Overlay */
        #security-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 0, 0, 0.4);
            display: none;
            z-index: 999;
            pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="triggerSecurity()">

    <div id="security-flash"></div>
    <canvas id="bg-canvas"></canvas>

    <div id="main-content" class="box">
        <div class="status-badge">SYSTEMS ONLINE: ENCRYPTED</div>
        <h1>HYPERION</h1>
        <div class="subtitle">CORE INTERFACE // V2.1</div>
        
        <p style="font-size: 11px; color: #666; margin-bottom: 10px;">ID: 77-ALPHA-992</p>
        
        <div class="key-container">
            <div id="key-text">XHYPERION1STKEY2K26</div>
        </div>
        
        <button onclick="copyKey()">Copy Key</button>
        
        <div class="footer-info">
            EXPIRATION: <span style="color: #fff;">48H</span> | 
            NODE: <span style="color: #fff;">US-CENTRAL</span><br>
            <br>
            <a href="https://discord.gg/zdcHCyjR7K" class="discord-link">JOIN DISCORD COLLECTIVE</a>
        </div>
    </div>

    <script>
        // MATRIX RAIN SCRIPT
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%'\"#&_(),.;:?!\\|{}<>[]^~";
        const fontSize = 16;
        const columns = canvas.width / fontSize;

        const rainDrops = [];

        for( let x = 0; x < columns; x++ ) {
            rainDrops[x] = 1;
        }

        const draw = () => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ff0000';
            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975){
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        };

        setInterval(draw, 30);

        // Security Tamper Alert
        function triggerSecurity() {
            const flash = document.getElementById('security-flash');
            flash.style.display = 'block';
            setTimeout(() => { flash.style.display = 'none'; }, 100);
        }

        // 1. ORIGINAL Copy Function
        function copyKey() {
            const text = document.getElementById("key-text").innerText;
            const btn = document.querySelector("button");
            
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "ACCESS COPIED";
                btn.style.background = "#00ff00";
                btn.style.borderColor = "#00ff00";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "#ff0000";
                    btn.style.borderColor = "#ff0000";
                }, 2000);
            });
        }

        // 2. ORIGINAL THE BYPASS BLOCK (With Enhanced Denied Screen)
        (function() {
            const ref = document.referrer;
            const isAuthorized = ref.includes("linkvertise.com") || ref.includes("link-target.net") || window.location.hostname === "localhost";
            
            if (isAuthorized) {
                document.body.style.display = "flex";
            } else {
                document.body.innerHTML = `
                    <div class="denied-screen">
                        <div class="warning-icon">⚠</div>
                        <h1 style="letter-spacing: 2px;">ACCESS DENIED</h1>
                        <p style="color:white; font-family:monospace; margin: 10px; letter-spacing: 2px;">SECURE CHANNEL NOT DETECTED</p>
                        <p style="color:red; font-family:monospace; font-size: 12px; max-width: 400px; text-align:center; border: 1px solid red; padding: 10px;">
                            CRITICAL ERROR: Referrer verification failed. <br>
                            Your IP has been logged for unauthorized access attempts.<br>
                            Please use the official Linkvertise gateway.
                        </p>
                        <button onclick="window.location.reload()" style="margin-top:30px; border-radius: 0;">RE-AUTHENTICATE</button>
                        <p style="font-size: 10px; color: #333; margin-top: 20px;">HYPERION SECURITY PROTOCOL V2.1</p>
                    </div>
                `;
                document.body.style.display = "flex";
            }
        })();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>

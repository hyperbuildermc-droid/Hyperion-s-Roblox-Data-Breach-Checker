<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HYPERION | KEY SYSTEM</title>
    <style>
        body { background-color: #0b0b0b; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; padding-top: 100px; margin: 0; overflow: hidden; }
        .box { border: 1px solid #333; display: inline-block; padding: 40px; background: #111; box-shadow: 0 0 20px rgba(255, 0, 0, 0.1); border-radius: 2px; }
        h1 { letter-spacing: 8px; text-shadow: 2px 2px #550000; margin-bottom: 5px; text-transform: uppercase; }
        .subtitle { color: #444; font-size: 12px; margin-bottom: 30px; letter-spacing: 2px; }
        .key-container { background: #000; border: 1px solid #222; padding: 15px; margin: 20px 0; }
        #key-text { font-size: 22px; color: #fff; font-weight: bold; letter-spacing: 2px; }
        button { background: #ff0000; color: #000; border: none; padding: 10px 20px; font-family: monospace; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        button:hover { background: #fff; box-shadow: 0 0 15px #ff0000; }
    </style>
</head>
<body>

    <div id="main-content" class="box">
        <h1>HYPERION</h1>
        <div class="subtitle">SECURITY INTERFACE v1.1</div>
        <p>ACTIVE SESSION DETECTED</p>
        <div class="key-container">
            <div id="key-text">XHYPERION1STKEY2K26</div>
        </div>
        <button onclick="copyKey()">Copy Access Key</button>
        <p style="color: #444; font-size: 10px; margin-top: 20px;">VALID FOR 24 HOURS • DO NOT SHARE</p>
    </div>

    <script>
        function copyKey() {
            const text = document.getElementById("key-text").innerText;
            navigator.clipboard.writeText(text);
            alert("ACCESS KEY COPIED");
        }

        // ANTI-BYPASS: This hides the content if they aren't coming from Linkvertise
        window.onload = function() {
            const ref = document.referrer;
            const isLinkvertise = ref.includes("linkvertise.com") || ref.includes("link-target.net");
            
            // If you are testing locally or via direct link, it will hide.
            if (!isLinkvertise) {
                document.getElementById("main-content").innerHTML = `
                    <h1 style="color:red;">UNAUTHORIZED ACCESS</h1>
                    <p style="color:white;">Direct entry is prohibited.</p>
                    <p>Please use the official Linkvertise gateway.</p>
                `;
            }
        }
    </script>
</body>
</html>

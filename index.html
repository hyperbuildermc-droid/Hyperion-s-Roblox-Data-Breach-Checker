<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPERION | KEY SYSTEM</title>
    <style>
        /* Hidden by default for security check */
        body { 
            display: none; 
            background-color: #050505; 
            color: #ff0000; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-direction: column;
        }

        /* Scanline Animation */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .box { 
            border: 1px solid #330000; 
            padding: 50px; 
            background: #0a0a0a; 
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.15), inset 0 0 10px #000; 
            position: relative;
            z-index: 3;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        /* Top Red Accent Line */
        .box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 3px;
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        h1 { 
            letter-spacing: 12px; 
            text-shadow: 0 0 10px #ff0000; 
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase; 
        }

        .subtitle { 
            color: #666; 
            font-size: 11px; 
            margin-bottom: 30px; 
            letter-spacing: 4px; 
            text-transform: uppercase;
        }

        .status-badge {
            font-size: 10px;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 2px 8px;
            display: inline-block;
            margin-bottom: 20px;
            text-shadow: 0 0 5px #00ff00;
        }

        .key-container { 
            background: #000; 
            border: 1px dashed #440000; 
            padding: 20px; 
            margin: 20px 0; 
            position: relative;
        }

        #key-text { 
            font-size: 20px; 
            color: #fff; 
            font-weight: bold; 
            letter-spacing: 3px; 
            word-break: break-all;
        }

        button { 
            background: #ff0000; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            font-family: monospace; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
        }

        button:hover { 
            background: #fff; 
            box-shadow: 0 0 20px #ff0000;
            transform: scale(1.05);
        }

        .footer-info { color: #444; font-size: 10px; margin-top: 25px; line-height: 1.6; }
        .discord-link { color: #5865F2; text-decoration: none; font-weight: bold; }
        .discord-link:hover { text-decoration: underline; }

        /* Access Denied Style */
        .denied-screen { 
            display: flex !important; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #050505; 
            color: red; 
            height: 100vh;
            width: 100vw;
        }

        .denied-screen h1 { animation: glitch 1s infinite; }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

    <div id="main-content" class="box">
        <div class="status-badge">SECURE CONNECTION ESTABLISHED</div>
        <h1>HYPERION</h1>
        <div class="subtitle">Nexus Key Interface v2.1</div>
        
        <p style="font-size: 12px; color: #aaa;">GENERATING ACCESS TOKEN...</p>
        
        <div class="key-container">
            <div id="key-text">XHYPERION1STKEY2K26</div>
        </div>
        
        <button onclick="copyKey()">Initialize Copy</button>
        
        <div class="footer-info">
            VALID FOR: <span style="color: #ff0000;">48 HOURS</span><br>
            ENCRYPTION: AES-256 ROB-HEX<br>
            <br>
            Join the collective: <a href="https://discord.gg/zdcHCyjR7K" class="discord-link">DISCORD SERVER</a>
        </div>
    </div>

    <script>
        // 1. Copy Function with Visual Feedback
        function copyKey() {
            const text = document.getElementById("key-text").innerText;
            const btn = document.querySelector("button");
            
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "COPIED TO SYSTEM";
                btn.style.background = "#00ff00";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "#ff0000";
                }, 2000);
            });
        }

        // 2. THE BYPASS BLOCK (Modified for instant display logic)
        (function() {
            const ref = document.referrer;
            // AUTHORIZATION CHECK
            const isAuthorized = ref.includes("linkvertise.com") || ref.includes("link-target.net") || window.location.hostname === "localhost";
            
            if (isAuthorized) {
                document.body.style.display = "flex";
            } else {
                document.body.innerHTML = `
                    <div class="denied-screen">
                        <h1>ACCESS DENIED</h1>
                        <p style="color:white; font-family:monospace; margin: 5px;">ILLEGAL ENTRY ATTEMPT DETECTED</p>
                        <p style="color:red; font-family:monospace; font-size: 12px;">Please use the official Linkvertise gateway to generate a session key.</p>
                        <button onclick="window.location.reload()" style="margin-top:20px; clip-path:none;">RETRY HANDSHAKE</button>
                    </div>
                `;
                document.body.style.display = "flex";
            }
        })();
    </script>
</body>
</html>
